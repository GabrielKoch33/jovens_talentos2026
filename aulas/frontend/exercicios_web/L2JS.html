<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Lista de Exercícios 2 - JavaScript</title>
<style>
  .quadradoIndice {
    width: 30px;
    height: 30px;
    /*display: inline-block;*/
    border: 1px solid black;
    text-align: center;
    font-size: 12px;
  }
</style>
</head>
<body>

  <!-- 1 -->
  <input type="number" id="num1">
  <input type="number" id="num2">
  <button onclick="somarEx1()">Somar</button>
  <div id="resultadoEx1"></div>

  <hr>

  <!-- 2 -->
  <input type="number" id="num1Ex2" onchange="somarEx2()">
  <input type="number" id="num2Ex2" onchange="somarEx2()">
  <div id="resultadoEx2">Resultado: 0</div>

  <hr>

  <!-- 3 -->
  <input type="number" id="num1Ex3" onchange="somarEx3()">
  <input type="number" id="num2Ex3" onchange="somarEx3()">
  <br><br>
  <label for="somaEx3">Soma</label>
  <input type="text" id="somaEx3" readonly disabled value="0">

  <hr>

  <!-- 4 -->
  <label for="quantidade">Quantidade</label>
  <input type="number" id="quantidade">
  <button onclick="gerarDivs()">Gerar</button>
  <div id="areaDivsEx4"></div>

  <hr>

  <!-- 5 -->
  <button onclick="criarDivColorida()">Clique aqui</button>
  <div id="areaEx5"></div>

  <script>

    // 1
    function somarEx1() {
      let valor1 = document.getElementById("num1").value;
      let valor2 = document.getElementById("num2").value;

      if (valor1 == "" || valor2 == "" || isNaN(valor1) || isNaN(valor2)) {
        window.alert("Informe 2 valores numéricos válidos!");
      } else {
        let soma = Number(valor1) + Number(valor2);
        window.alert("A soma é: " + soma);
      }
    }

    // 2
    function somarEx2() {
      let valor1 = document.getElementById("num1Ex2").value;
      let valor2 = document.getElementById("num2Ex2").value;
      let div = document.getElementById("resultadoEx2");

      if (valor1 == "" || valor2 == "" || isNaN(valor1) || isNaN(valor2)) {
        div.innerHTML = "Resultado: 0";
      } else {
        let soma = Number(valor1) + Number(valor2);
        div.innerHTML = "Resultado: " + soma;
      }
    }

    // 3
    function somarEx3() {
      let valor1 = document.getElementById("num1Ex3").value;
      let valor2 = document.getElementById("num2Ex3").value;
      let campoSoma = document.getElementById("somaEx3");

      if (valor1 == "" || valor2 == "" || isNaN(valor1) || isNaN(valor2)) {
        campoSoma.value = 0;
      } else {
        campoSoma.value = Number(valor1) + Number(valor2);
      }
    }

    // 4

    function gerarDivs() {
    let area = document.getElementById("areaDivsEx4");

    // limpa a área antes de gerar, sempre — assim não precisa de variável de controle
    area.innerHTML = "";

    let quantidade = Number(document.getElementById("quantidade").value);

    for (let i = 1; i <= quantidade; i++) {
        let novaDiv = document.createElement("div");
        novaDiv.className = "quadradoIndice";
        novaDiv.innerHTML = i;
        area.appendChild(novaDiv);
    }
    }

    // 5
    let cores = ["aqua", "black", "brown", "gold", "grey", "red", "yellow",
                 "green", "blue", "magenta", "tomato", "orange", "olive", "navy"];

    function criarDivColorida() {
      let corDeFundo = cores[Math.floor(Math.random() * cores.length)];
      let corDaBorda = cores[Math.floor(Math.random() * cores.length)];

      let div = document.createElement("div");
      div.style.width = "20px";
      div.style.height = "20px";
      div.style.backgroundColor = corDeFundo;
      div.style.border = "3px solid " + corDaBorda;
      div.style.marginTop = "5px";

      document.getElementById("areaEx5").appendChild(div);
    }

  </script>

</body>
</html>
