<html lang="en">

    <link rel="stylesheet" href="L4-ipm_contato.css">
</head>

<body>
    <header class="painel">
        <img src="ipmsistemas_logo.jpg" class="logo" alt="Logo IPM">
    </header>

    <div class="conteudo">

        <div class="enderecos">

            <h2>Onde nos encontrar</h2>

            <div class="localizacao">
                <h3>Sede Administrativa - Florianópolis, SC</h3>
                <p>Rua Cristóvão Nunes Pires, 86</p>
                <p>Torre Süden, 6º Andar</p>
                <p>(48) 3031-7500</p>
            </div>

            <div class="localizacao">
                <h3>Centro de Tecnologia - Rio do Sul, SC</h3>
                <p>Rua Duque de Caxias, 180</p>
                <p>Jardim América</p>
                <p>(47) 3531-1500</p>
            </div>

        </div>

        <div class="formulario">

            <h2>Entre em contato</h2>

            <form action="php.php" method="post">

                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" name="nome">

                <label for="email">E-mail</label>
                <input type="email" id="email" name="email">

                <label for="telefone">Telefone</label>
                <input type="tel" id="telefone" name="telefone">

                <label for="cidade">Cidade</label>
                <input type="text" id="cidade" name="cidade">

                <label for="estado">Estado</label>
                <input type="text" id="estado" name="estado">

                <label for="cargo">Cargo</label>
                <input type="text" id="cargo" name="cargo">

                <label for="setor">Setor de Atuação</label>
                <input type="text" id="setor" name="setor">

                <label for="entidade">Entidade</label>
                <input type="text" id="entidade" name="entidade">

                <label for="mensagem">Mensagem</label>
                <textarea id="mensagem" rows="5"></textarea>

                <label>
                    <input type="checkbox">
                    Você é um cliente com dificuldade?
                </label>

                <button type="submit">Enviar</button>

            </form>

        </div>

    </div>
</body>
